x-env_tty: &env_tty
  env_file:
    - .env
  tty: true
  stdin_open: true
x-bind_mount: &bind_mount
  volumes:
    - type: bind
      source: .
      target: /root/app
    - type: bind
      source: /run/user/1000/wayland-1
      target: /tmp/wayland-1
  working_dir: /root/app
  platform: linux/amd64
services:
  app:
    container_name: ae_tutorial
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Etc/UTC}
    !!merge <<: [*bind_mount, *env_tty]
    environment:
      XDG_RUNTIME_DIR: /tmp
      WAYLAND_DISPLAY: $WAYLAND_DISPLAY
      DISPLAY: :0
    entrypoint: zsh
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
